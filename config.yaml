name: "wMBus MQTT Bridge"
description: "MQTT RAW HEX -> wmbusmeters (stdin:hex) -> MQTT + Home Assistant Discovery"
version: "1.5.32"
slug: "wmbus_mqtt_bridge"
stage: experimental
image: "ghcr.io/kustonium/{arch}-addon-wmbus_mqtt_bridge"
arch:
  - amd64
  - aarch64

init: false

ingress: true
ingress_port: 8099
hassio_api: true
panel_icon: mdi:gauge
panel_title: "wMBus Bridge"
services:
  - mqtt:want

options:
  raw_topic: "wmbus/+/telegram"
  loglevel: "normal"
  filter_hex_only: true
  debug_every_n: 0

  search_mode: false
  search_expected_value_m3: 0
  search_tolerance_m3: 0.05
  search_delta_mode: false
  search_min_delta_m3: 0.001
  search_topic: "wmbus/search/candidates"

  discovery_enabled: true
  discovery_prefix: "homeassistant"
  discovery_retain: true

  state_prefix: "wmbusmeters"
  state_retain: false

  mqtt_mode: "auto"
  external_mqtt_host: ""
  external_mqtt_port: 1883
  external_mqtt_username: ""
  external_mqtt_password: ""

  meters: []

schema:
  raw_topic: str
  loglevel: list(normal|verbose|debug)
  filter_hex_only: bool
  debug_every_n: int
  search_mode: bool
  search_expected_value_m3: float
  search_tolerance_m3: float
  search_delta_mode: bool
  search_min_delta_m3: float
  search_topic: str
  discovery_enabled: bool
  discovery_prefix: str
  discovery_retain: bool
  state_prefix: str
  state_retain: bool
  mqtt_mode: list(auto|ha|external)
  external_mqtt_host: str?
  external_mqtt_port: int
  external_mqtt_username: str?
  external_mqtt_password: str?
  meters:
    - id: str
      meter_id: str
      # Free string: wmbusmeters validates the driver at decode time and its
      # driver set changes between versions. A fixed enum here goes stale (e.g.
      # 'izarv2' was missing), and Supervisor then rejects valid meters with
      # HTTP 400 on save — the meter then only lands in a file-only fallback and
      # disappears on the next restart/upgrade. 'auto' and 'other' (+ type_other)
      # still work. Kept in sync with the dev repo's schema.
      type: str
      type_other: str?
      key: str?
