version: 2

updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Warsaw"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
      include: "scope"

  # Dockerfile — stable addon
  - package-ecosystem: "docker"
    directory: "/wmbus_mqtt_bridge"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:15"
      timezone: "Europe/Warsaw"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "docker"
      include: "scope"

  # Dockerfile — dev addon
  - package-ecosystem: "docker"
    directory: "/wmbus_mqtt_bridge_dev"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:15"
      timezone: "Europe/Warsaw"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "docker"
      include: "scope"