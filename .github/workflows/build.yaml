name: build-addon

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-addon-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.addon }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runs_on }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # Stable addon — built only from main branch
          - addon: wmbus_mqtt_bridge
            channel: stable
            branch: main
            arch: amd64
            platform: linux/amd64
            base_image: ghcr.io/home-assistant/amd64-base:3.20
            runs_on: ubuntu-latest
          - addon: wmbus_mqtt_bridge
            channel: stable
            branch: main
            arch: aarch64
            platform: linux/arm64
            base_image: ghcr.io/home-assistant/aarch64-base:3.20
            runs_on: ubuntu-24.04-arm

          # Dev addon — built only from dev branch
          - addon: wmbus_mqtt_bridge_dev
            channel: dev
            branch: dev
            arch: amd64
            platform: linux/amd64
            base_image: ghcr.io/home-assistant/amd64-base:3.20
            runs_on: ubuntu-latest
          - addon: wmbus_mqtt_bridge_dev
            channel: dev
            branch: dev
            arch: aarch64
            platform: linux/arm64
            base_image: ghcr.io/home-assistant/aarch64-base:3.20
            runs_on: ubuntu-24.04-arm

    steps:
      - name: Skip when branch does not match channel
        id: gate
        shell: bash
        run: |
          set -euo pipefail
          REF_BRANCH="${GITHUB_REF#refs/heads/}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "manual dispatch on ${REF_BRANCH} — building ${{ matrix.addon }} (${{ matrix.channel }})"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "${REF_BRANCH}" != "${{ matrix.branch }}" ]]; then
            echo "branch ${REF_BRANCH} != ${{ matrix.branch }} for channel ${{ matrix.channel }} — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "branch ${REF_BRANCH} matches channel ${{ matrix.channel }} — building"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@v6

      - name: Debug GitHub context
        if: steps.gate.outputs.skip != 'true'
        shell: bash
        run: |
          echo "GITHUB_REPOSITORY=${GITHUB_REPOSITORY}"
          echo "GITHUB_REPOSITORY_OWNER=${GITHUB_REPOSITORY_OWNER}"
          echo "GITHUB_REF=${GITHUB_REF}"
          echo "GITHUB_ACTOR=${GITHUB_ACTOR}"
          echo "addon=${{ matrix.addon }} channel=${{ matrix.channel }} arch=${{ matrix.arch }}"

      - name: Prepare build variables
        if: steps.gate.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

          CFG="${{ matrix.addon }}/config.yaml"
          VER="$(sed -nE 's/^version:[[:space:]]*"?([^"[:space:]]+)"?[[:space:]]*$/\1/p' "${CFG}" | head -n1)"
          if [[ -z "${VER}" ]]; then
            echo "ERROR: cannot read version from ${CFG}"
            exit 1
          fi
          echo "ADDON_VERSION=${VER}" >> "$GITHUB_ENV"

          # Image base name comes from the addon folder name.
          # Stable: wmbus_mqtt_bridge       -> ghcr.io/<owner>/<arch>-addon-wmbus_mqtt_bridge
          # Dev:    wmbus_mqtt_bridge_dev   -> ghcr.io/<owner>/<arch>-addon-wmbus_mqtt_bridge-dev
          if [[ "${{ matrix.channel }}" == "dev" ]]; then
            IMAGE_BASE="addon-wmbus_mqtt_bridge-dev"
          else
            IMAGE_BASE="addon-wmbus_mqtt_bridge"
          fi
          echo "IMAGE_BASE=${IMAGE_BASE}" >> "$GITHUB_ENV"
          echo "Building ${{ matrix.channel }} version ${VER} from ${CFG}"

      - name: Check GHCR token
        if: steps.gate.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${{ secrets.GHCR_TOKEN }}" ]]; then
            echo "ERROR: missing repository secret GHCR_TOKEN (PAT with read:packages and write:packages)."
            exit 1
          fi

      - name: Login to GHCR
        if: steps.gate.outputs.skip != 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: Kustonium
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.gate.outputs.skip != 'true'
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        if: steps.gate.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          docker buildx build \
            --progress=plain \
            --platform ${{ matrix.platform }} \
            --build-arg BUILD_FROM=${{ matrix.base_image }} \
            --push \
            -t ghcr.io/${OWNER_LC}/${{ matrix.arch }}-${IMAGE_BASE}:${{ matrix.channel }} \
            -t ghcr.io/${OWNER_LC}/${{ matrix.arch }}-${IMAGE_BASE}:${ADDON_VERSION} \
            -f ${{ matrix.addon }}/Dockerfile \
            ${{ matrix.addon }}
