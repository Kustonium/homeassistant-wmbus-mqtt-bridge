name: build-addon

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            build_from: ghcr.io/home-assistant/amd64-base:3.20
          - arch: aarch64
            platform: linux/arm64
            build_from: ghcr.io/home-assistant/aarch64-base:3.20

    steps:
      - uses: actions/checkout@v5

      - name: Lowercase owner
        shell: bash
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Read add-on version from config.yaml
        shell: bash
        run: |
          VER="$(grep -oP '^version:\s*"\K[^"]+' config.yaml)"
          echo "ADDON_VERSION=${VER}" >> $GITHUB_ENV
          echo "Building version: ${VER}"

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4

      - name: Build and push ${{ matrix.arch }}
        run: |
          docker buildx build \
            --progress=plain \
            --platform ${{ matrix.platform }} \
            --build-arg BUILD_FROM=${{ matrix.build_from }} \
            --push \
            -t ghcr.io/${{ env.OWNER_LC }}/${{ matrix.arch }}-addon-wmbus_mqtt_bridge:latest \
            -t ghcr.io/${{ env.OWNER_LC }}/${{ matrix.arch }}-addon-wmbus_mqtt_bridge:${{ env.ADDON_VERSION }} \
            -f Dockerfile \
            .