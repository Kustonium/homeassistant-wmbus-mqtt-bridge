name: build-addon

on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-addon-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-amd64:
    name: Build and push amd64 dev image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Debug GitHub context
        shell: bash
        run: |
          echo "GITHUB_REPOSITORY=${GITHUB_REPOSITORY}"
          echo "GITHUB_REPOSITORY_OWNER=${GITHUB_REPOSITORY_OWNER}"
          echo "GITHUB_REF=${GITHUB_REF}"
          echo "GITHUB_ACTOR=${GITHUB_ACTOR}"

      - name: Prepare build variables
        shell: bash
        run: |
          set -euo pipefail
          echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

          VER="$(sed -nE 's/^version:[[:space:]]*"?([^"[:space:]]+)"?[[:space:]]*$/\1/p' config.yaml | head -n1)"
          if [[ -z "${VER}" ]]; then
            echo "ERROR: Cannot read version from config.yaml"
            exit 1
          fi

          echo "ADDON_VERSION=${VER}" >> "$GITHUB_ENV"
          echo "Building dev version: ${VER}"

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push amd64 dev image
        shell: bash
        run: |
          set -euo pipefail
          docker buildx build \
            --progress=plain \
            --platform linux/amd64 \
            --build-arg BUILD_FROM=ghcr.io/home-assistant/amd64-base:3.20 \
            --push \
            -t ghcr.io/${{ env.OWNER_LC }}/amd64-addon-wmbus_mqtt_bridge-dev:dev \
            -t ghcr.io/${{ env.OWNER_LC }}/amd64-addon-wmbus_mqtt_bridge-dev:${{ env.ADDON_VERSION }} \
            -f Dockerfile \
            .

  build-aarch64:
    name: Build and push aarch64 dev image
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v6

      - name: Debug GitHub context
        shell: bash
        run: |
          echo "GITHUB_REPOSITORY=${GITHUB_REPOSITORY}"
          echo "GITHUB_REPOSITORY_OWNER=${GITHUB_REPOSITORY_OWNER}"
          echo "GITHUB_REF=${GITHUB_REF}"
          echo "GITHUB_ACTOR=${GITHUB_ACTOR}"

      - name: Prepare build variables
        shell: bash
        run: |
          set -euo pipefail
          echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

          VER="$(sed -nE 's/^version:[[:space:]]*"?([^"[:space:]]+)"?[[:space:]]*$/\1/p' config.yaml | head -n1)"
          if [[ -z "${VER}" ]]; then
            echo "ERROR: Cannot read version from config.yaml"
            exit 1
          fi

          echo "ADDON_VERSION=${VER}" >> "$GITHUB_ENV"
          echo "Building dev version: ${VER}"

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push aarch64 dev image
        shell: bash
        run: |
          set -euo pipefail
          docker buildx build \
            --progress=plain \
            --platform linux/arm64 \
            --build-arg BUILD_FROM=ghcr.io/home-assistant/aarch64-base:3.20 \
            --push \
            -t ghcr.io/${{ env.OWNER_LC }}/aarch64-addon-wmbus_mqtt_bridge-dev:dev \
            -t ghcr.io/${{ env.OWNER_LC }}/aarch64-addon-wmbus_mqtt_bridge-dev:${{ env.ADDON_VERSION }} \
            -f Dockerfile \
            .
