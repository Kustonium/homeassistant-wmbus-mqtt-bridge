name: build-addon

on:
  push:
    branches:
      - main
    paths:
      - 'rootfs/**'
      - 'Dockerfile'
      - 'config.yaml'
      - 'translations/**'
      - '.github/workflows/build.yaml'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: build-addon-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Job 1: gate + version check (runs ONCE, before matrix) ──────────────────
  preflight:
    name: Preflight (gate + version check)
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.gate.outputs.skip }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Gate (path-aware)
        id: gate
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "manual dispatch — building"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED="$(git diff --name-only HEAD~1 HEAD 2>/dev/null || true)"
          if [[ -z "${CHANGED}" ]]; then
            echo "cannot determine changed files — building defensively"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Files changed in this push:"
          echo "${CHANGED}" | sed 's/^/  /'

          PATTERN="^(rootfs/|Dockerfile|config\.yaml|translations/|\.github/workflows/build\.yaml$)"
          if echo "${CHANGED}" | grep -qE "${PATTERN}"; then
            echo "image-affecting change — building"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "no image-affecting changes — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Enforce version bump
        if: steps.gate.outputs.skip != 'true' && github.event_name != 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail

          CFG="config.yaml"
          CURRENT="$(sed -nE 's/^version:[[:space:]]*"?([^"[:space:]]+)"?[[:space:]]*$/\1/p' "${CFG}" | head -n1)"

          if [[ -z "${CURRENT}" ]]; then
            echo "ERROR: cannot read version from ${CFG}"
            exit 1
          fi

          if [[ "${CURRENT}" == *"-"* ]]; then
            echo "ERROR: version '${CURRENT}' contains '-' — strip the suffix before releasing."
            exit 1
          fi

          git fetch --tags --quiet 2>/dev/null || true
          LAST_TAG="$(git tag --sort=-v:refname | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)"

          echo "Current version : ${CURRENT}"
          echo "Last tag        : ${LAST_TAG:-none}"

          if [[ -n "${LAST_TAG}" && "${CURRENT}" == "${LAST_TAG}" ]]; then
            echo "ERROR: version ${CURRENT} already exists as a git tag. Bump version before pushing."
            exit 1
          fi

          echo "OK: version ${CURRENT} is new."

  # ── Job 2: matrix build (starts only after preflight succeeds) ───────────────
  build:
    name: Build wmbus_mqtt_bridge (${{ matrix.arch }})
    runs-on: ${{ matrix.runs_on }}
    needs: preflight
    if: needs.preflight.outputs.skip != 'true'

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            base_image: ghcr.io/home-assistant/amd64-base:3.20
            runs_on: ubuntu-latest
          - arch: aarch64
            platform: linux/arm64
            base_image: ghcr.io/home-assistant/aarch64-base:3.20
            runs_on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Prepare build variables
        shell: bash
        run: |
          set -euo pipefail
          echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

          CFG="config.yaml"
          VER="$(sed -nE 's/^version:[[:space:]]*"?([^"[:space:]]+)"?[[:space:]]*$/\1/p' "${CFG}" | head -n1)"
          if [[ -z "${VER}" ]]; then
            echo "ERROR: cannot read version from ${CFG}"
            exit 1
          fi
          echo "ADDON_VERSION=${VER}" >> "$GITHUB_ENV"
          echo "Building stable version ${VER}"

      - name: Check GHCR token
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${{ secrets.GHCR_TOKEN }}" ]]; then
            echo "ERROR: missing repository secret GHCR_TOKEN (PAT with read:packages and write:packages)."
            exit 1
          fi

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: Kustonium
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        shell: bash
        run: |
          set -euo pipefail
          docker buildx build \
            --progress=plain \
            --platform ${{ matrix.platform }} \
            --build-arg BUILD_FROM=${{ matrix.base_image }} \
            --build-arg ADDON_VERSION=${ADDON_VERSION} \
            --push \
            -t ghcr.io/${OWNER_LC}/${{ matrix.arch }}-addon-wmbus_mqtt_bridge:latest \
            -t ghcr.io/${OWNER_LC}/${{ matrix.arch }}-addon-wmbus_mqtt_bridge:${ADDON_VERSION} \
            -f Dockerfile \
            .

      - name: Create git tag
        if: matrix.arch == 'amd64'
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --quiet 2>/dev/null || true
          if git rev-parse -q --verify "refs/tags/${ADDON_VERSION}" >/dev/null; then
            echo "Tag ${ADDON_VERSION} already exists — skipping."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${ADDON_VERSION}"
          git push "https://x-access-token:${PROMOTE_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "${ADDON_VERSION}"
        env:
          PROMOTE_TOKEN: ${{ secrets.PROMOTE_TOKEN }}

      - name: Create GitHub Release
        if: matrix.arch == 'amd64'
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ env.ADDON_VERSION }}
          name: ${{ env.ADDON_VERSION }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}