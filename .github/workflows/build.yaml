name: build-addon

on:
  # Dev branch = test builds only. No GHCR push.
  # The tested commit is later merged to main through a pull request.
  push:
    branches:
      - dev

  # Release/publish is explicit: run manually from main.
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-addon-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_SUFFIX: addon-wmbus_mqtt_bridge

jobs:
  build-amd64:
    name: Build amd64
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Lowercase owner
        shell: bash
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Read add-on version from config.yaml
        shell: bash
        run: |
          set -euo pipefail
          VER="$(sed -nE 's/^version:[[:space:]]*"?([^"#]+)"?.*/\1/p' config.yaml | head -n 1 | tr -d '[:space:]')"
          if [[ -z "${VER}" ]]; then
            echo "Cannot read version from config.yaml" >&2
            exit 1
          fi
          echo "ADDON_VERSION=${VER}" >> "$GITHUB_ENV"
          echo "Building version: ${VER}"

      - uses: docker/login-action@v4
        if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build amd64
        shell: bash
        run: |
          set -euo pipefail

          IMAGE="ghcr.io/${{ env.OWNER_LC }}/amd64-${{ env.IMAGE_SUFFIX }}"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "Publishing amd64 main image to GHCR: ${IMAGE}:{${ADDON_VERSION},latest}"

            docker buildx build \
              --progress=plain \
              --platform linux/amd64 \
              --build-arg BUILD_FROM=ghcr.io/home-assistant/amd64-base:3.20 \
              --push \
              -t "${IMAGE}:latest" \
              -t "${IMAGE}:${ADDON_VERSION}" \
              -f Dockerfile \
              .
          else
            echo "Test build amd64 only. No GHCR push. Publishing is manual workflow_dispatch on main only."

            docker buildx build \
              --progress=plain \
              --platform linux/amd64 \
              --build-arg BUILD_FROM=ghcr.io/home-assistant/amd64-base:3.20 \
              -f Dockerfile \
              .
          fi

  build-aarch64:
    name: Build aarch64
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v6

      - name: Lowercase owner
        shell: bash
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Read add-on version from config.yaml
        shell: bash
        run: |
          set -euo pipefail
          VER="$(sed -nE 's/^version:[[:space:]]*"?([^"#]+)"?.*/\1/p' config.yaml | head -n 1 | tr -d '[:space:]')"
          if [[ -z "${VER}" ]]; then
            echo "Cannot read version from config.yaml" >&2
            exit 1
          fi
          echo "ADDON_VERSION=${VER}" >> "$GITHUB_ENV"
          echo "Building version: ${VER}"

      - uses: docker/login-action@v4
        if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build aarch64
        shell: bash
        run: |
          set -euo pipefail

          IMAGE="ghcr.io/${{ env.OWNER_LC }}/aarch64-${{ env.IMAGE_SUFFIX }}"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "Publishing aarch64 main image to GHCR: ${IMAGE}:{${ADDON_VERSION},latest}"

            docker buildx build \
              --progress=plain \
              --platform linux/arm64 \
              --build-arg BUILD_FROM=ghcr.io/home-assistant/aarch64-base:3.20 \
              --push \
              -t "${IMAGE}:latest" \
              -t "${IMAGE}:${ADDON_VERSION}" \
              -f Dockerfile \
              .
          else
            echo "Test build aarch64 only. No GHCR push. Publishing is manual workflow_dispatch on main only."

            docker buildx build \
              --progress=plain \
              --platform linux/arm64 \
              --build-arg BUILD_FROM=ghcr.io/home-assistant/aarch64-base:3.20 \
              -f Dockerfile \
              .
          fi
