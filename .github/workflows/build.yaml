name: build-addon

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-amd64:
    name: Build amd64
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Lowercase owner
        shell: bash
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Read add-on version from config.yaml
        shell: bash
        run: |
          VER="$(grep -oP '^version:\s*"\K[^"]+' config.yaml)"
          echo "ADDON_VERSION=${VER}" >> $GITHUB_ENV
          echo "Building version: ${VER}"

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push amd64
        run: |
          docker buildx build \
            --progress=plain \
            --platform linux/amd64 \
            --build-arg BUILD_FROM=ghcr.io/home-assistant/amd64-base:3.20 \
            --push \
            -t ghcr.io/${{ env.OWNER_LC }}/amd64-addon-wmbus_mqtt_bridge:latest \
            -t ghcr.io/${{ env.OWNER_LC }}/amd64-addon-wmbus_mqtt_bridge:${{ env.ADDON_VERSION }} \
            -f Dockerfile \
            .

  build-aarch64:
    name: Build aarch64
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v5

      - name: Lowercase owner
        shell: bash
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Read add-on version from config.yaml
        shell: bash
        run: |
          VER="$(grep -oP '^version:\s*"\K[^"]+' config.yaml)"
          echo "ADDON_VERSION=${VER}" >> $GITHUB_ENV
          echo "Building version: ${VER}"

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push aarch64
        run: |
          docker buildx build \
            --progress=plain \
            --platform linux/arm64 \
            --build-arg BUILD_FROM=ghcr.io/home-assistant/aarch64-base:3.20 \
            --push \
            -t ghcr.io/${{ env.OWNER_LC }}/aarch64-addon-wmbus_mqtt_bridge:latest \
            -t ghcr.io/${{ env.OWNER_LC }}/aarch64-addon-wmbus_mqtt_bridge:${{ env.ADDON_VERSION }} \
            -f Dockerfile \
            .