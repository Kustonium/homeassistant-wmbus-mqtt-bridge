name: build-addon

on:
  # Build once on dev. The same checked commit can then be merged to main.
  push:
    branches:
      - dev

  # Manual run is kept for emergency/release publishing from main.
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-amd64:
    name: Build amd64
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Lowercase owner
        shell: bash
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Read add-on version from config.yaml
        shell: bash
        run: |
          VER="$(grep -oP '^version:\s*"\K[^"]+' config.yaml)"
          echo "ADDON_VERSION=${VER}" >> $GITHUB_ENV
          echo "Building version: ${VER}"
      - uses: docker/login-action@v4
        if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build amd64
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "Publishing amd64 image to GHCR because this is manual workflow_dispatch on main"
            docker buildx build \
              --progress=plain \
              --platform linux/amd64 \
              --build-arg BUILD_FROM=ghcr.io/home-assistant/amd64-base:3.20 \
              --push \
              -t ghcr.io/${{ env.OWNER_LC }}/amd64-addon-wmbus_mqtt_bridge:latest \
              -t ghcr.io/${{ env.OWNER_LC }}/amd64-addon-wmbus_mqtt_bridge:${{ env.ADDON_VERSION }} \
              -f Dockerfile \
              .
          else
            echo "Test build amd64 only. No GHCR push for dev."
            docker buildx build \
              --progress=plain \
              --platform linux/amd64 \
              --build-arg BUILD_FROM=ghcr.io/home-assistant/amd64-base:3.20 \
              -f Dockerfile \
              .
          fi
  build-aarch64:
    name: Build aarch64
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v6

      - name: Lowercase owner
        shell: bash
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Read add-on version from config.yaml
        shell: bash
        run: |
          VER="$(grep -oP '^version:\s*"\K[^"]+' config.yaml)"
          echo "ADDON_VERSION=${VER}" >> $GITHUB_ENV
          echo "Building version: ${VER}"
      - uses: docker/login-action@v4
        if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build aarch64
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "Publishing aarch64 image to GHCR because this is manual workflow_dispatch on main"
            docker buildx build \
              --progress=plain \
              --platform linux/arm64 \
              --build-arg BUILD_FROM=ghcr.io/home-assistant/aarch64-base:3.20 \
              --push \
              -t ghcr.io/${{ env.OWNER_LC }}/aarch64-addon-wmbus_mqtt_bridge:latest \
              -t ghcr.io/${{ env.OWNER_LC }}/aarch64-addon-wmbus_mqtt_bridge:${{ env.ADDON_VERSION }} \
              -f Dockerfile \
              .
          else
            echo "Test build aarch64 only. No GHCR push for dev."
            docker buildx build \
              --progress=plain \
              --platform linux/arm64 \
              --build-arg BUILD_FROM=ghcr.io/home-assistant/aarch64-base:3.20 \
              -f Dockerfile \
              .
          fi