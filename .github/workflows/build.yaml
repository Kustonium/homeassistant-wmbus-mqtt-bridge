name: build-addon

concurrency:
  group: build-addon-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - dev
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-amd64:
    name: Build amd64
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Prepare channel metadata
        shell: bash
        run: |
          set -euo pipefail

          OWNER_LC="${GITHUB_REPOSITORY_OWNER,,}"

          if [[ "${GITHUB_REF}" == "refs/heads/dev" ]]; then
            CONFIG_FILE="wmbus_mqtt_bridge_dev/config.yaml"
            IMAGE_NAME="amd64-addon-wmbus_mqtt_bridge-dev"
            EXTRA_TAG="dev"
          elif [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            CONFIG_FILE="wmbus_mqtt_bridge/config.yaml"
            IMAGE_NAME="amd64-addon-wmbus_mqtt_bridge"
            EXTRA_TAG="latest"
          else
            echo "ERROR: Unsupported branch for publishing: ${GITHUB_REF}"
            exit 1
          fi

          VER="$(sed -nE 's/^version:[[:space:]]*"?([^"[:space:]]+)"?[[:space:]]*$/\1/p' "${CONFIG_FILE}" | head -n1)"
          if [[ -z "${VER}" ]]; then
            echo "ERROR: Cannot read version from ${CONFIG_FILE}"
            exit 1
          fi

          echo "OWNER_LC=${OWNER_LC}" >> "$GITHUB_ENV"
          echo "CONFIG_FILE=${CONFIG_FILE}" >> "$GITHUB_ENV"
          echo "ADDON_VERSION=${VER}" >> "$GITHUB_ENV"
          echo "IMAGE=ghcr.io/${OWNER_LC}/${IMAGE_NAME}" >> "$GITHUB_ENV"
          echo "EXTRA_TAG=${EXTRA_TAG}" >> "$GITHUB_ENV"

          echo "Branch: ${GITHUB_REF}"
          echo "Config: ${CONFIG_FILE}"
          echo "Image: ghcr.io/${OWNER_LC}/${IMAGE_NAME}"
          echo "Version: ${VER}"
          echo "Extra tag: ${EXTRA_TAG}"

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push amd64
        shell: bash
        run: |
          set -euo pipefail
          docker buildx build \
            --progress=plain \
            --platform linux/amd64 \
            --build-arg BUILD_FROM=ghcr.io/home-assistant/amd64-base:3.20 \
            --push \
            -t "${IMAGE}:${ADDON_VERSION}" \
            -t "${IMAGE}:${EXTRA_TAG}" \
            -f Dockerfile \
            .

  build-aarch64:
    name: Build aarch64
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v6

      - name: Prepare channel metadata
        shell: bash
        run: |
          set -euo pipefail

          OWNER_LC="${GITHUB_REPOSITORY_OWNER,,}"

          if [[ "${GITHUB_REF}" == "refs/heads/dev" ]]; then
            CONFIG_FILE="wmbus_mqtt_bridge_dev/config.yaml"
            IMAGE_NAME="aarch64-addon-wmbus_mqtt_bridge-dev"
            EXTRA_TAG="dev"
          elif [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            CONFIG_FILE="wmbus_mqtt_bridge/config.yaml"
            IMAGE_NAME="aarch64-addon-wmbus_mqtt_bridge"
            EXTRA_TAG="latest"
          else
            echo "ERROR: Unsupported branch for publishing: ${GITHUB_REF}"
            exit 1
          fi

          VER="$(sed -nE 's/^version:[[:space:]]*"?([^"[:space:]]+)"?[[:space:]]*$/\1/p' "${CONFIG_FILE}" | head -n1)"
          if [[ -z "${VER}" ]]; then
            echo "ERROR: Cannot read version from ${CONFIG_FILE}"
            exit 1
          fi

          echo "OWNER_LC=${OWNER_LC}" >> "$GITHUB_ENV"
          echo "CONFIG_FILE=${CONFIG_FILE}" >> "$GITHUB_ENV"
          echo "ADDON_VERSION=${VER}" >> "$GITHUB_ENV"
          echo "IMAGE=ghcr.io/${OWNER_LC}/${IMAGE_NAME}" >> "$GITHUB_ENV"
          echo "EXTRA_TAG=${EXTRA_TAG}" >> "$GITHUB_ENV"

          echo "Branch: ${GITHUB_REF}"
          echo "Config: ${CONFIG_FILE}"
          echo "Image: ghcr.io/${OWNER_LC}/${IMAGE_NAME}"
          echo "Version: ${VER}"
          echo "Extra tag: ${EXTRA_TAG}"

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push aarch64
        shell: bash
        run: |
          set -euo pipefail
          docker buildx build \
            --progress=plain \
            --platform linux/arm64 \
            --build-arg BUILD_FROM=ghcr.io/home-assistant/aarch64-base:3.20 \
            --push \
            -t "${IMAGE}:${ADDON_VERSION}" \
            -t "${IMAGE}:${EXTRA_TAG}" \
            -f Dockerfile \
            .
