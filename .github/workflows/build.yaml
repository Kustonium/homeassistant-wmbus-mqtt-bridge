name: build-addon

on:
  push:
    branches:
      - main
    paths:
      - 'wmbus_mqtt_bridge/rootfs/**'
      - 'wmbus_mqtt_bridge/Dockerfile'
      - 'wmbus_mqtt_bridge/config.yaml'
      - 'wmbus_mqtt_bridge/translations/**'
      - '.github/workflows/build.yaml'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: build-addon-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build wmbus_mqtt_bridge (${{ matrix.arch }})
    runs-on: ${{ matrix.runs_on }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            base_image: ghcr.io/home-assistant/amd64-base:3.20
            runs_on: ubuntu-latest
          - arch: aarch64
            platform: linux/arm64
            base_image: ghcr.io/home-assistant/aarch64-base:3.20
            runs_on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Gate (path-aware)
        id: gate
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "manual dispatch — building"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED="$(git diff --name-only HEAD~1 HEAD 2>/dev/null || true)"
          if [[ -z "${CHANGED}" ]]; then
            echo "cannot determine changed files — building defensively"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Files changed in this push:"
          echo "${CHANGED}" | sed 's/^/  /'

          PATTERN="^(wmbus_mqtt_bridge/(rootfs/|Dockerfile|config\.yaml|translations/)|\.github/workflows/build\.yaml$)"
          if echo "${CHANGED}" | grep -qE "${PATTERN}"; then
            echo "image-affecting change — building"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "no image-affecting changes (README/CHANGELOG/etc only) — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Debug GitHub context
        if: steps.gate.outputs.skip != 'true'
        shell: bash
        run: |
          echo "GITHUB_REPOSITORY=${GITHUB_REPOSITORY}"
          echo "GITHUB_REPOSITORY_OWNER=${GITHUB_REPOSITORY_OWNER}"
          echo "GITHUB_REF=${GITHUB_REF}"
          echo "arch=${{ matrix.arch }}"

      - name: Enforce version bump
        if: steps.gate.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail

          CFG="wmbus_mqtt_bridge/config.yaml"
          CURRENT="$(sed -nE 's/^version:[[:space:]]*"?([^"[:space:]]+)"?[[:space:]]*$/\1/p' "${CFG}" | head -n1)"

          if [[ -z "${CURRENT}" ]]; then
            echo "ERROR: cannot read version from ${CFG}"
            exit 1
          fi

          if [[ "${CURRENT}" == *"-"* ]]; then
            echo "ERROR: version '${CURRENT}' still contains '-' — strip '-dev' before merging to main."
            exit 1
          fi

          git fetch --tags --quiet 2>/dev/null || true
          LAST_TAG="$(git tag --sort=-v:refname | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)"

          echo "Current version in config.yaml : ${CURRENT}"
          echo "Last published git tag          : ${LAST_TAG:-none}"

          if [[ -n "${LAST_TAG}" && "${CURRENT}" == "${LAST_TAG}" ]]; then
            echo "ERROR: version ${CURRENT} already exists as a git tag."
            echo "Bump version in ${CFG} before merging to main."
            exit 1
          fi

          echo "OK: version ${CURRENT} is new."

      - name: Prepare build variables
        if: steps.gate.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

          CFG="wmbus_mqtt_bridge/config.yaml"
          VER="$(sed -nE 's/^version:[[:space:]]*"?([^"[:space:]]+)"?[[:space:]]*$/\1/p' "${CFG}" | head -n1)"
          if [[ -z "${VER}" ]]; then
            echo "ERROR: cannot read version from ${CFG}"
            exit 1
          fi
          echo "ADDON_VERSION=${VER}" >> "$GITHUB_ENV"
          echo "Building stable version ${VER}"

      - name: Check GHCR token
        if: steps.gate.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${{ secrets.GHCR_TOKEN }}" ]]; then
            echo "ERROR: missing repository secret GHCR_TOKEN (PAT with read:packages and write:packages)."
            exit 1
          fi

      - name: Login to GHCR
        if: steps.gate.outputs.skip != 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: Kustonium
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.gate.outputs.skip != 'true'
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        if: steps.gate.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          docker buildx build \
            --progress=plain \
            --platform ${{ matrix.platform }} \
            --build-arg BUILD_FROM=${{ matrix.base_image }} \
            --build-arg ADDON_VERSION=${ADDON_VERSION} \
            --push \
            -t ghcr.io/${OWNER_LC}/${{ matrix.arch }}-addon-wmbus_mqtt_bridge:latest \
            -t ghcr.io/${OWNER_LC}/${{ matrix.arch }}-addon-wmbus_mqtt_bridge:${ADDON_VERSION} \
            -f wmbus_mqtt_bridge/Dockerfile \
            wmbus_mqtt_bridge

      - name: Create git tag
        if: steps.gate.outputs.skip != 'true' && matrix.arch == 'amd64'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${ADDON_VERSION}"
          git push origin "${ADDON_VERSION}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: steps.gate.outputs.skip != 'true' && matrix.arch == 'amd64'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.ADDON_VERSION }}
          name: ${{ env.ADDON_VERSION }}
          body_path: wmbus_mqtt_bridge/CHANGELOG.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
