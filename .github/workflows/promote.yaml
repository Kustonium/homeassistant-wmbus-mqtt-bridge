name: promote-to-stable

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: promote-to-stable
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout stable repo
        uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 0

      - name: Checkout dev repo
        uses: actions/checkout@v6
        with:
          repository: Kustonium/homeassistant-wmbus-mqtt-bridge-dev
          token: ${{ secrets.PROMOTE_TOKEN }}
          path: _dev

      - name: Detect and validate version from dev
        id: version
        shell: bash
        run: |
          DEV_VER="$(sed -nE 's/^version:[[:space:]]*"?([^"[:space:]]+)"?[[:space:]]*$/\1/p' _dev/config.yaml | head -n1)"
          if [[ -z "${DEV_VER}" ]]; then
            echo "ERROR: cannot read version from _dev/config.yaml"
            exit 1
          fi
          VERSION="$(echo "${DEV_VER}" | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+')"
          if [[ -z "${VERSION}" ]]; then
            echo "ERROR: cannot extract X.Y.Z from dev version '${DEV_VER}'"
            exit 1
          fi
          git fetch --tags --quiet 2>/dev/null || true
          if git tag | grep -qx "${VERSION}"; then
            echo "ERROR: tag ${VERSION} already exists."
            exit 1
          fi
          echo "Dev version: ${DEV_VER} → stable: ${VERSION}"
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog from dev commits
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.VERSION }}"

          MAJOR="$(echo "${VERSION}" | cut -d. -f1)"
          MINOR="$(echo "${VERSION}" | cut -d. -f2)"
          PATCH="$(echo "${VERSION}" | cut -d. -f3)"
          PREV_BASE="${MAJOR}.${MINOR}.$((PATCH - 1))"

          # Find the last commit in dev where the previous base version was present
          BOUNDARY_SHA=""
          while IFS= read -r sha; do
            if git -C _dev show "${sha}:config.yaml" 2>/dev/null | grep -qE "^version:.*${PREV_BASE}"; then
              BOUNDARY_SHA="${sha}"
              break
            fi
          done < <(git -C _dev log --pretty=format:"%H" -- config.yaml)

          # Collect meaningful commits since that boundary
          if [[ -n "${BOUNDARY_SHA}" ]]; then
            CHANGES="$(git -C _dev log "${BOUNDARY_SHA}..HEAD" --pretty=format:"- %s" \
              | grep -vE "^- ci\(dev\): |^- Merge " || true)"
          else
            CHANGES="$(git -C _dev log -50 --pretty=format:"- %s" \
              | grep -vE "^- ci\(dev\): |^- Merge " || true)"
          fi

          if [[ -z "${CHANGES}" ]]; then
            CHANGES="- Minor improvements and bug fixes"
          fi

          DATE="$(date +%Y-%m-%d)"
          printf "## %s (%s)\n\n%s\n" "${VERSION}" "${DATE}" "${CHANGES}" > CHANGELOG.md

          echo "--- CHANGELOG.md ---"
          cat CHANGELOG.md

      - name: Copy runtime files from dev to stable
        shell: bash
        run: |
          set -euo pipefail

          for item in rootfs Dockerfile translations; do
            if [[ -e "_dev/${item}" ]]; then
              rm -rf "${item}"
              cp -r "_dev/${item}" "${item}"
              echo "synced: ${item}"
            fi
          done

          find rootfs -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true

          for f in rootfs/usr/bin/run.sh rootfs/usr/bin/bridge.sh rootfs/usr/bin/webui.py; do
            if [[ -e "${f}" ]]; then
              chmod +x "${f}"
              git update-index --add --chmod=+x "${f}" 2>/dev/null || true
            fi
          done

      - name: Set stable version in config.yaml
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.VERSION }}"
          sed -i -E "s/^(version:[[:space:]]*\").*\"/\1${VERSION}\"/" config.yaml
          grep '^version:' config.yaml

      - name: Commit and push
        shell: bash
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rootfs/ Dockerfile config.yaml CHANGELOG.md
          [[ -d translations ]] && git add translations/ || true
          git diff --staged --stat
          if git diff --staged --quiet; then
            echo "No changes — stable already matches dev."
          else
            git commit -m "release: ${{ steps.version.outputs.VERSION }}"
            git push origin main
          fi
