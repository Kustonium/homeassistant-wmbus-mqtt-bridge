name: promote-to-stable

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: promote-to-stable
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout stable repo
        uses: actions/checkout@v7
        with:
          ref: main
          token: ${{ secrets.PROMOTE_TOKEN }}
          persist-credentials: true
          fetch-depth: 0

      - name: Checkout dev repo
        shell: bash
        run: git -c credential.helper= clone https://github.com/Kustonium/homeassistant-wmbus-mqtt-bridge-dev.git _dev

      - name: Detect and validate version from dev
        id: version
        shell: bash
        run: |
          DEV_VER="$(sed -nE 's/^version:[[:space:]]*"?([^"[:space:]]+)"?[[:space:]]*$/\1/p' _dev/config.yaml | head -n1)"
          if [[ -z "${DEV_VER}" ]]; then
            echo "ERROR: cannot read version from _dev/config.yaml"
            exit 1
          fi
          VERSION="$(echo "${DEV_VER}" | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+')"
          if [[ -z "${VERSION}" ]]; then
            echo "ERROR: cannot extract X.Y.Z from dev version '${DEV_VER}'"
            exit 1
          fi
          git fetch --tags --quiet 2>/dev/null || true
          if git tag | grep -qx "${VERSION}"; then
            echo "ERROR: tag ${VERSION} already exists."
            exit 1
          fi
          echo "Dev version: ${DEV_VER} → stable: ${VERSION}"
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Copy changelog from dev
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.VERSION }}"
          MARKER="PROMOTE-CHANGELOG-REQUIRED"

          if [[ ! -s _dev/CHANGELOG.md ]]; then
            echo "ERROR: _dev/CHANGELOG.md is missing or empty"
            exit 1
          fi

          # Auto-consolidate the whole dev cycle into one "## X.Y.Z" section.
          # The dev changelog accrues one "## X.Y.Z-dev.NN" section per CI build
          # (plus a bare "## X.Y.Z-dev" placeholder with the PROMOTE marker), so
          # the top heading is normally a per-build .NN. Rather than demand a
          # manual "consolidate to ## X.Y.Z-dev before promoting" step (which used
          # to hard-fail every run on that .NN heading), gather every section of
          # the current cycle from the top — stopping at the previous version —
          # strip the per-build headings and the marker, de-duplicate bullets
          # (the per-build skeletons repeat entries) while preserving multi-line
          # bullets, and regroup under Added / Changed / Fixed / Other (review).
          # A maintainer may still hand-write a single consolidated section in
          # dev for nicer prose; that one section is consumed as-is.
          awk -v ver="${VERSION}" -v marker="${MARKER}" '
            function flush() {
              if (block != "") {
                if (!(block in seen)) { seen[block]=1; bucket[cur]=bucket[cur] block }
                block=""
              }
            }
            BEGIN { started=0; stopped=0; cur="Other (review)"; no=0 }
            /^##[[:space:]]+/ {
              flush()
              h=$0; gsub(/^##[[:space:]]+|[[:space:]]+$/, "", h)
              if (h ~ ("^" ver "-dev([.][0-9]+)?$")) { started=1 } else { stopped=1 }
              next
            }
            stopped { next }
            !started { next }
            index($0, marker) { next }
            /^###[[:space:]]+/ {
              flush()
              s=$0; gsub(/^###[[:space:]]+|[[:space:]]+$/, "", s); cur=s
              if (!(s in order_seen)) { order_seen[s]=1; order[++no]=s }
              next
            }
            /^-[[:space:]]/ { flush(); block=$0 "\n"; next }
            /^[[:space:]]+[^[:space:]]/ { if (block != "") block=block $0 "\n"; next }
            { next }
            END {
              flush()
              printf "## %s\n", ver
              npref=4; pref[1]="Added"; pref[2]="Changed"; pref[3]="Fixed"; pref[4]="Other (review)"
              for (i=1;i<=npref;i++) { s=pref[i]; if (s in bucket) printf "\n### %s\n%s", s, bucket[s] }
              for (i=1;i<=no;i++) { s=order[i]; isp=0; for (j=1;j<=npref;j++) if (pref[j]==s) isp=1; if (!isp && (s in bucket)) printf "\n### %s\n%s", s, bucket[s] }
            }
          ' _dev/CHANGELOG.md > /tmp/dev-changelog-section.md

          if ! grep -Eq '^-[[:space:]]' /tmp/dev-changelog-section.md; then
            echo "ERROR: no release-note bullets found for cycle ${VERSION}-dev (nothing to promote)"
            exit 1
          fi

          if grep -q "^## ${VERSION}$" CHANGELOG.md; then
            echo "ERROR: stable CHANGELOG.md already contains ${VERSION}"
            exit 1
          fi

          cp CHANGELOG.md /tmp/stable-changelog-history.md
          {
            cat /tmp/dev-changelog-section.md
            printf '\n'
            cat /tmp/stable-changelog-history.md
          } > CHANGELOG.md

          echo "--- CHANGELOG.md ---"
          cat CHANGELOG.md

      - name: Copy runtime files from dev to stable
        shell: bash
        run: |
          set -euo pipefail

          # Files that must track dev verbatim — runtime AND documentation, so
          # stable is "a copy of dev minus the dev identity". docker/ (the
          # standalone-Docker entrypoint) and docs/README previously drifted the
          # same way config.yaml did. Repo-infra and identity are deliberately
          # NOT here: .github/ (this very workflow lives there), repository.yaml
          # (name/url), config.yaml identity (handled in the sync step), LICENSE.
          for item in rootfs Dockerfile docker translations wmbusmeters-mqtt-stdin \
                      README.md THIRD_PARTY_NOTICES.md docs; do
            if [[ -e "_dev/${item}" ]]; then
              rm -rf "${item}"
              cp -r "_dev/${item}" "${item}"
              echo "synced: ${item}"
            fi
          done

          # docs/ tracks dev EXCEPT the dev-internal session handoff (not user docs).
          rm -f docs/CLAUDE_HANDOFF.md

          # Strip dev-identity blocks from the synced README. The dev README
          # carries a "DEV / maintainer only" banner between DEV-ONLY markers;
          # copied verbatim it would tell stable users that stable itself is a
          # test channel. Same policy as the config.yaml identity rewrite:
          # stable is "a copy of dev minus the dev identity".
          if [[ -f README.md ]] && grep -q 'DEV-ONLY-START' README.md; then
            sed -i '/<!-- DEV-ONLY-START/,/<!-- DEV-ONLY-END -->/d' README.md
            echo "stripped DEV-ONLY block(s) from README.md"
          fi
          if grep -q 'DEV-ONLY-START' README.md 2>/dev/null; then
            echo "ERROR: unbalanced DEV-ONLY markers left in README.md after strip"
            exit 1
          fi

          find rootfs -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true

          for f in rootfs/usr/bin/run.sh rootfs/usr/bin/bridge.sh rootfs/usr/bin/webui.py; do
            if [[ -e "${f}" ]]; then
              chmod +x "${f}"
              git update-index --add --chmod=+x "${f}" 2>/dev/null || true
            fi
          done

      - name: Sync config.yaml from dev (schema/options/permissions) + set stable version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.VERSION }}"

          # Adopt dev's config.yaml wholesale so schema/options/permission fixes
          # reach stable (promote previously copied only rootfs, so config.yaml
          # drifted — e.g. meters[].type stayed a stale driver enum and izarv2
          # meters were rejected, and verify_ha_entities / homeassistant_api were
          # missing). Then restore the stable add-on IDENTITY captured from the
          # stable config.yaml. Everything non-identity (schema, options,
          # homeassistant_api, etc.) now tracks dev automatically.
          S_NAME="$(sed -nE 's/^name:[[:space:]]*(.*)$/\1/p' config.yaml | head -n1)"
          S_DESC="$(sed -nE 's/^description:[[:space:]]*(.*)$/\1/p' config.yaml | head -n1)"
          S_SLUG="$(sed -nE 's/^slug:[[:space:]]*(.*)$/\1/p' config.yaml | head -n1)"
          S_IMAGE="$(sed -nE 's/^image:[[:space:]]*(.*)$/\1/p' config.yaml | head -n1)"
          S_PANEL="$(sed -nE 's/^panel_title:[[:space:]]*(.*)$/\1/p' config.yaml | head -n1)"

          cp _dev/config.yaml config.yaml

          if [ -n "${S_NAME}" ];  then sed -i -E "s|^name:.*|name: ${S_NAME}|"  config.yaml; fi
          if [ -n "${S_DESC}" ];  then sed -i -E "s|^description:.*|description: ${S_DESC}|" config.yaml; fi
          if [ -n "${S_SLUG}" ];  then sed -i -E "s|^slug:.*|slug: ${S_SLUG}|"  config.yaml; fi
          if [ -n "${S_IMAGE}" ]; then sed -i -E "s|^image:.*|image: ${S_IMAGE}|" config.yaml; fi
          if [ -n "${S_PANEL}" ]; then sed -i -E "s|^panel_title:.*|panel_title: ${S_PANEL}|" config.yaml; fi

          # Stable release version (X.Y.Z), overriding dev's X.Y.Z-dev.
          sed -i -E "s/^(version:[[:space:]]*\").*\"/\1${VERSION}\"/" config.yaml

          echo "--- stable config.yaml identity + version ---"
          grep -E '^(name|slug|image|version|panel_title):' config.yaml

      - name: Commit, create PR, and auto-merge
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PROMOTE_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.VERSION }}"
          BRANCH="release/${VERSION}"

          # Configure remote with PROMOTE_TOKEN so all git operations authenticate properly
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/Kustonium/homeassistant-wmbus-mqtt-bridge.git"

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stage the FULL result of the dev->stable sync, not a hand-picked
          # list. The "Copy runtime files" step already rm-rf+cp-r's rootfs,
          # Dockerfile, docker, translations, wmbusmeters-mqtt-stdin, README.md,
          # THIRD_PARTY_NOTICES.md and docs/ (and removes docs/CLAUDE_HANDOFF.md),
          # and the next step rewrites config.yaml. The old explicit list omitted
          # README/docs/docker/THIRD_PARTY, so those were copied but never
          # committed — stable doc parity silently never happened (README stayed
          # stale at 1.5.38). git add -A stages exactly what the sync produced.
          git add -A
          git diff --staged --stat

          if git diff --staged --quiet; then
            echo "No changes — stable already matches dev."
            exit 0
          fi

          git commit -m "release: ${VERSION}"

          # Push to release branch (unprotected)
          git push origin "HEAD:${BRANCH}"

          # Create PR
          gh pr create \
            --base main \
            --head "${BRANCH}" \
            --title "release: ${VERSION}" \
            --body "Automated promote of ${VERSION} to stable."

          # Force-merge with admin bypass (Kustonium is admin + in bypass list)
          gh pr merge "${BRANCH}" --squash --admin --delete-branch

      - name: Bump dev base version for next cycle
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PROMOTE_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.VERSION }}"
          MAJOR="$(echo "${VERSION}" | cut -d. -f1)"
          MINOR="$(echo "${VERSION}" | cut -d. -f2)"
          PATCH="$(echo "${VERSION}" | cut -d. -f3)"
          NEXT_BASE="${MAJOR}.${MINOR}.$((PATCH + 1))-dev"

          TMPDIR="$(mktemp -d)"
          git clone "https://x-access-token:${GH_TOKEN}@github.com/Kustonium/homeassistant-wmbus-mqtt-bridge-dev.git" "${TMPDIR}"
          cd "${TMPDIR}"

          CURRENT="$(sed -nE 's/^version:[[:space:]]*"?([^"[:space:]]+)"?[[:space:]]*$/\1/p' config.yaml | head -n1)"
          CURRENT_BASE="$(echo "${CURRENT}" | sed -E 's/^([0-9]+\.[0-9]+\.[0-9]+-dev).*/\1/')"

          if [[ "${CURRENT_BASE}" == "${NEXT_BASE}" ]]; then
            echo "Dev base already at ${NEXT_BASE} — nothing to bump."
            exit 0
          fi

          echo "Bumping dev base: ${CURRENT_BASE} → ${NEXT_BASE}"
          sed -i -E "s/^(version:[[:space:]]*\").*\"/\1${NEXT_BASE}\"/" config.yaml

          if ! grep -q "^## ${NEXT_BASE}$" CHANGELOG.md; then
            tmp="$(mktemp)"
            {
              printf '## %s\n\n' "${NEXT_BASE}"
              printf '<!-- PROMOTE-CHANGELOG-REQUIRED: replace this placeholder with release notes before promoting. -->\n\n'
              cat CHANGELOG.md
            } > "${tmp}"
            mv "${tmp}" CHANGELOG.md
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add config.yaml CHANGELOG.md
          git commit -m "chore: bump dev base to ${NEXT_BASE} after ${VERSION} release [skip ci]"
          git push origin main
